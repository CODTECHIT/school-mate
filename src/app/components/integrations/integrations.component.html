<section class="integrations" id="integrations">
  <div class="section-container">
    <div class="section-header">
      <span class="section-badge">Integrations</span>
      <h2>Seamlessly <span class="highlight">Integrated</span> with Leading Platforms</h2>
      <p>Connect your school ecosystem with powerful third-party integrations</p>
    </div>

    <div class="integrations-grid">
      <div class="integration-card" *ngFor="let item of integrations">
        <div class="integration-icon">
          <span class="material-icon">{{ item.icon }}</span>
        </div>
        <h4>{{ item.name }}</h4>
        <p>{{ item.description }}</p>
      </div>
    </div>

    <div class="integrations-visual">
      <a
        href="https://play.google.com/store/apps/details?id=com.schoolmate.student"
        target="_blank"
        rel="noopener noreferrer"
        class="download-link"
      >
        <img
          src="images/download.webp"
          alt="Download schoolmate App on Google Play"
          class="download-img"
          draggable="false"
        />
      </a>
    </div>
  </div>
</section>
